services:
  qdrant:
    image: qdrant/qdrant:v1.15.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 3s
      retries: 12

  api:
    build: .
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: commerce_products
      EMBEDDING_BACKEND: production
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    command: ["uvicorn", "commerce_engine.api:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  qdrant_storage:
